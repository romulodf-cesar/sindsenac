<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar Empresas</title>
</head>
<body>
    <table>
        <tr>
            <th>Nome</th>
            <th>CNPJ</th>
        </tr>
        {% for empresa in empresas %}
        <tr>
            <td>{{ empresa.nome }}</td>
            <td>{{ empresa.cnpj }}</td>
        </tr>
        {% endfor %}

    </table>
</body>
</html>
